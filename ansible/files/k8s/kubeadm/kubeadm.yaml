apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: stable
controlPlaneEndpoint: "kcp01.socal.rr.com:6443"
etcd:
  external:
    endpoints:
    - https://192.168.1.50:2379
    # - https://ETCD_1_IP:2379
    # - https://ETCD_2_IP:2379
    caFile: /etc/ssl/certs/kcp01.int.crt
    certFile: /etc/kubernetes/pki/kubernetes.default.svc.crt
    keyFile: /etc/kubernetes/pki/kubernetes.default.svc.key
  managed: false
apiServer:
  timeoutForControlPlane: "4m0s"
controllerManager:
  extraArgs:
    allocate-node-cidrs: "true"
dns:
  type: CoreDNS
etcdLocalDataDir: /var/lib/etcd
# etcdImage: "k8s.gcr.io/etcd:3.5.0-0"
etcdService:
  type: External
imageRepository: "k8s.gcr.io"
kubeProxy:
  config:
    bindAddress: 0.0.0.0
kubernetesAPIServerCertSANs:
- 192.168.1.50
kubernetesSkipTLSVerify: true
